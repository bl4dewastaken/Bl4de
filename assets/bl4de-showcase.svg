<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">BL4DE code AI motion showcase</title>
  <desc id="desc">A glass interface showing code, an AI chat assistant, and a motion editing timeline for the BL4DE portfolio.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.42" stop-color="#f5f2ef"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#760008"/>
      <stop offset="0.56" stop-color="#e50914"/>
      <stop offset="1" stop-color="#ff3448"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09090b"/>
      <stop offset="1" stop-color="#2f1115"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#09090b" flood-opacity="0.16"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#09090b" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="820" fill="url(#bg)"/>
  <rect width="1200" height="820" fill="url(#grid)"/>
  <path d="M-80 182C188 94 309 210 556 129C811 46 961 93 1280 8V191C1011 251 819 210 610 272C343 352 204 246-80 349Z" fill="#e50914" opacity="0.12"/>
  <path d="M-60 680C194 575 353 706 584 626C796 553 941 592 1270 492V684C997 756 828 716 618 760C354 817 194 724-60 793Z" fill="#09090b" opacity="0.08"/>

  <g filter="url(#soft)">
    <rect x="88" y="92" width="1024" height="628" rx="8" fill="#ffffff" fill-opacity="0.72" stroke="#ffffff" stroke-width="2"/>
    <rect x="112" y="122" width="976" height="574" rx="8" fill="#ffffff" fill-opacity="0.48" stroke="#09090b" stroke-opacity="0.12"/>
  </g>

  <g>
    <rect x="140" y="164" width="286" height="244" rx="8" fill="#09090b"/>
    <rect x="160" y="187" width="82" height="12" rx="6" fill="#e50914"/>
    <rect x="160" y="224" width="206" height="9" rx="4.5" fill="#ffffff" opacity="0.72"/>
    <rect x="160" y="252" width="146" height="9" rx="4.5" fill="#ffffff" opacity="0.34"/>
    <rect x="185" y="280" width="188" height="9" rx="4.5" fill="#ff3448" opacity="0.76"/>
    <rect x="185" y="308" width="118" height="9" rx="4.5" fill="#ffffff" opacity="0.38"/>
    <rect x="160" y="336" width="218" height="9" rx="4.5" fill="#ffffff" opacity="0.62"/>
    <rect x="185" y="364" width="132" height="9" rx="4.5" fill="#e50914" opacity="0.8"/>
    <text x="160" y="392" fill="#ffffff" opacity="0.72" font-family="Consolas, monospace" font-size="18">API + Python</text>
  </g>

  <g>
    <rect x="462" y="164" width="306" height="244" rx="8" fill="#ffffff" fill-opacity="0.82" stroke="#09090b" stroke-opacity="0.12"/>
    <text x="488" y="205" fill="#760008" font-family="Arial, sans-serif" font-weight="800" font-size="22">AI ASSISTANT</text>
    <rect x="488" y="232" width="214" height="42" rx="8" fill="#f3efef"/>
    <rect x="526" y="250" width="132" height="8" rx="4" fill="#09090b" opacity="0.22"/>
    <rect x="542" y="294" width="196" height="44" rx="8" fill="url(#red)"/>
    <rect x="568" y="313" width="118" height="8" rx="4" fill="#ffffff" opacity="0.74"/>
    <rect x="488" y="360" width="170" height="10" rx="5" fill="#09090b" opacity="0.16"/>
    <rect x="488" y="382" width="218" height="10" rx="5" fill="#09090b" opacity="0.12"/>
  </g>

  <g>
    <rect x="804" y="164" width="256" height="244" rx="8" fill="#111113"/>
    <rect x="832" y="192" width="200" height="112" rx="8" fill="url(#ink)" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="864" y="262" fill="#ffffff" font-family="Arial, sans-serif" font-weight="900" font-size="54">B4</text>
    <path d="M832 344H1032" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2"/>
    <rect x="832" y="366" width="158" height="16" rx="8" fill="#e50914"/>
    <rect x="832" y="394" width="92" height="16" rx="8" fill="#ffffff" opacity="0.42"/>
  </g>

  <g>
    <rect x="140" y="454" width="920" height="184" rx="8" fill="#ffffff" fill-opacity="0.68" stroke="#09090b" stroke-opacity="0.12"/>
    <text x="170" y="500" fill="#09090b" font-family="Arial, sans-serif" font-weight="900" font-size="28">MOTION TIMELINE</text>
    <rect x="170" y="530" width="570" height="22" rx="8" fill="url(#red)"/>
    <rect x="304" y="566" width="420" height="22" rx="8" fill="#09090b" opacity="0.72"/>
    <rect x="214" y="602" width="654" height="22" rx="8" fill="#e50914" opacity="0.34"/>
    <rect x="800" y="526" width="204" height="84" rx="8" fill="#09090b"/>
    <path d="M824 574C846 536 865 614 886 576C908 538 925 613 948 574C968 540 984 592 1004 558" fill="none" stroke="#ff3448" stroke-width="6" stroke-linecap="round"/>
    <path d="M594 512V646" stroke="#e50914" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  </g>

  <g>
    <text x="140" y="680" fill="#09090b" font-family="Arial, sans-serif" font-weight="900" font-size="46">BL4DE</text>
    <text x="332" y="680" fill="#760008" font-family="Arial, sans-serif" font-weight="800" font-size="22">CODE / AI / MOTION DESIGN</text>
  </g>
</svg>
